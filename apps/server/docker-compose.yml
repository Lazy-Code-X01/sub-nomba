version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sub_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sub_user
      POSTGRES_PASSWORD: sub_pass
      POSTGRES_DB: sub_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sub_user -d sub_db']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sub_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sub_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://sub_user:sub_pass@postgres:5432/sub_db
      REDIS_URL: redis://redis:6379
      PORT: 3000
      NOMBA_BASE_URL: ${NOMBA_BASE_URL}
      NOMBA_CLIENT_ID: ${NOMBA_CLIENT_ID}
      NOMBA_CLIENT_SECRET: ${NOMBA_CLIENT_SECRET}
      NOMBA_ACCOUNT_ID: ${NOMBA_ACCOUNT_ID}
      NOMBA_SUB_ACCOUNT_ID: ${NOMBA_SUB_ACCOUNT_ID}
    ports:
      - '3000:3000'

volumes:
  postgres_data:
  redis_data:
